<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://telloproduce.app.n8n.cloud; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
  <title>Aprobación de Nómina PILOTO</title>
  <style>
    :root{font-family:system-ui,-apple-system,sans-serif;color:#24291f;background:#f8f1e8}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px}
    main{width:min(520px,100%);background:#fff;border-radius:18px;box-shadow:0 12px 36px #3d2a181f;overflow:hidden}
    header{background:#1e4a38;color:#fff;padding:22px 24px}
    header p{margin:4px 0 0;color:#d8e6dc;font-size:14px}
    section{padding:22px 24px}
    .alerta{background:#fff0c7;color:#803900;border-left:5px solid #e69b00;padding:12px;border-radius:8px;margin-bottom:18px;font-weight:700}
    label{display:block;font-weight:700;margin:14px 0 6px}
    input{width:100%;padding:12px;border:1px solid #cfc8bb;border-radius:9px;font:inherit}
    button{width:100%;margin-top:18px;border:0;border-radius:10px;padding:14px 16px;background:#a43d12;color:#fff;font:inherit;font-weight:800;cursor:pointer}
    button:disabled{opacity:.55;cursor:wait}
    #resultado{display:none;margin-top:16px;padding:12px;border-radius:9px;font-weight:650;white-space:pre-wrap;word-break:break-word}
    .nota{font-size:13px;color:#69695f;line-height:1.45}
    a{color:#1e4a38}
  </style>
</head>
<body>
  <main>
    <header>
      <strong>TELLO PRODUCE · ADMINISTRACIÓN</strong>
      <p>Aprobación de nómina semanal — entorno PILOTO</p>
    </header>
    <section>
      <div class="alerta">Solo el responsable autorizado debe usar esta pantalla.</div>

      <label for="webhook">Webhook administrativo</label>
      <input id="webhook" type="url" value="https://telloproduce.app.n8n.cloud/webhook/aprobar-nomina-piloto" autocomplete="url">

      <label for="clave">Clave administrativa de nómina</label>
      <input id="clave" type="password" minlength="32" autocomplete="current-password">

      <label for="responsable">Nombre del responsable</label>
      <input id="responsable" type="text" maxlength="120" value="Supervisor PILOTO" autocomplete="name">

      <p class="nota">La clave de captura de campo no funciona aquí. Este dispositivo puede recordarla únicamente si marcas la casilla.</p>
      <label class="nota"><input id="recordar" type="checkbox" style="width:auto"> Recordar la clave administrativa en este dispositivo</label>

      <button id="aprobar" type="button">Aprobar nómina semanal</button>
      <div id="resultado" role="status" aria-live="polite"></div>
      <p class="nota"><a href="./">Volver a Registro de Campo</a></p>
    </section>
  </main>

  <script>
    'use strict';
    const webhook = document.getElementById('webhook');
    const clave = document.getElementById('clave');
    const responsable = document.getElementById('responsable');
    const recordar = document.getElementById('recordar');
    const aprobar = document.getElementById('aprobar');
    const resultado = document.getElementById('resultado');
    let confirmacionArmada = false;
    let confirmacionTimer = null;

    const guardada = localStorage.getItem('nominaAdminKeyPiloto');
    if (guardada) {
      clave.value = guardada;
      recordar.checked = true;
    }

    function mostrar(mensaje, tipo) {
      resultado.style.display = 'block';
      resultado.textContent = String(mensaje || '');
      const estilos = {
        ok: ['#e1f0e0', '#1e4a38'],
        espera: ['#fcefd8', '#8a5a00'],
        error: ['#fbe7e2', '#a43120']
      };
      const colores = estilos[tipo] || estilos.error;
      resultado.style.background = colores[0];
      resultado.style.color = colores[1];
    }

    function validar() {
      const url = new URL(webhook.value.trim());
      if (url.protocol !== 'https:' ||
          url.hostname !== 'telloproduce.app.n8n.cloud' ||
          url.pathname !== '/webhook/aprobar-nomina-piloto') {
        throw new Error('La URL no corresponde al webhook administrativo PILOTO.');
      }
      if (clave.value.trim().length < 32) {
        throw new Error('La clave administrativa debe tener al menos 32 caracteres.');
      }
      if (!responsable.value.trim()) {
        throw new Error('Escribe el nombre del responsable.');
      }
      return url.toString();
    }

    aprobar.addEventListener('click', async () => {
      if (!confirmacionArmada) {
        try { validar(); } catch (error) { mostrar(error.message, 'error'); return; }
        confirmacionArmada = true;
        aprobar.textContent = 'Confirmar aprobación definitiva';
        mostrar('Segundo paso: confirma solo si ya revisaste Nomina_Semanal.', 'espera');
        clearTimeout(confirmacionTimer);
        confirmacionTimer = setTimeout(() => {
          confirmacionArmada = false;
          aprobar.textContent = 'Aprobar nómina semanal';
          mostrar('La confirmación venció. Vuelve a iniciar si deseas aprobar.', 'espera');
        }, 15000);
        return;
      }

      confirmacionArmada = false;
      clearTimeout(confirmacionTimer);
      aprobar.disabled = true;
      aprobar.textContent = 'Procesando…';
      mostrar('Bloqueando la semana y procesando la aprobación…', 'espera');

      try {
        const url = validar();
        if (recordar.checked) {
          localStorage.setItem('nominaAdminKeyPiloto', clave.value.trim());
        } else {
          localStorage.removeItem('nominaAdminKeyPiloto');
        }
        const response = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Nomina-Key': clave.value.trim()
          },
          body: JSON.stringify({ aprobadoPor: responsable.value.trim() })
        });
        let data = {};
        try { data = await response.json(); } catch (_) {}

        if (response.ok) {
          mostrar(data.mensaje || 'Nómina aprobada y correo enviado.', 'ok');
        } else if (response.status === 409) {
          mostrar(data.mensaje || 'La semana ya fue procesada o está ocupada.', 'espera');
        } else if (response.status === 202) {
          mostrar(data.mensaje || 'Historial guardado; el correo quedó pendiente de reintento.', 'espera');
        } else {
          throw new Error(data.mensaje || 'Error HTTP ' + response.status);
        }
      } catch (error) {
        mostrar(error.message || 'No se pudo aprobar la nómina.', 'error');
      } finally {
        aprobar.disabled = false;
        aprobar.textContent = 'Aprobar nómina semanal';
      }
    });
  </script>
</body>
</html>
